# Slack app manifest — create app at api.slack.com/apps → "From a manifest".
# Replace <DEPLOY> with the Vercel prod URL once live.
display_information:
  name: Rampage
  description: Challenge a coworker — winner grabs a slice of the bonus pool 🎁
  background_color: "#18181b"
features:
  bot_user:
    display_name: rampage
    always_online: true
  slash_commands:
    - command: /rampage
      url: https://<DEPLOY>/api/slack/command
      description: Challenge a coworker to Receipt Match Blitz
      usage_hint: "@teammate"
      should_escape: false
oauth_config:
  scopes:
    bot:
      - commands
      - chat:write
      - users:read
settings:
  interactivity:
    is_enabled: true
    request_url: https://<DEPLOY>/api/slack/interactivity
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
